<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EduLink — Portail Famille</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest-portail.json">
<meta name="theme-color" content="#0f6e56">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="EduLink Famille">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.6.0/jspdf.plugin.autotable.min.js"></script>
<style>
/* ══ BASE ══ */
*{margin:0;box-sizing:border-box}
:root{
  --navy:#1e3a5f;
  --teal:#0f6e56;
  --teal-light:#e1f5ee;
  --gold:#c97c1a;
  --red:#dc2626;
  --amber:#d97706;
  --green:#059669;
  --bg:#f0f7f4;
  --white:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
  --card:#ffffff;
  --radius:16px;
}
body{font-family:'Poppins',sans-serif;background:var(--bg);min-height:100vh;color:var(--text)}

/* ══ LOGIN ══ */
#login-screen{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:linear-gradient(160deg,#0f6e56 0%,#1e3a5f 60%,#0f2040 100%);
  display:flex;align-items:center;justify-content:center;z-index:2000;
  padding:1rem;
}
.login-card{
  background:#fff;border-radius:24px;padding:2rem 1.8rem;width:100%;max-width:400px;
  box-shadow:0 30px 80px rgba(0,0,0,.3);
}
.login-brand{text-align:center;margin-bottom:2rem}
.login-brand .brand-ico{
  width:70px;height:70px;border-radius:20px;
  background:linear-gradient(135deg,#0f6e56,#1e3a5f);
  display:flex;align-items:center;justify-content:center;
  font-size:32px;margin:0 auto .75rem;box-shadow:0 8px 20px rgba(15,110,86,.3);
}
.login-brand h1{font-family:'Nunito',sans-serif;font-size:24px;font-weight:800;color:#1e3a5f;margin-bottom:2px}
.login-brand p{font-size:12.5px;color:#6b7280}
.login-tag{
  display:inline-flex;align-items:center;gap:5px;
  background:#e1f5ee;color:#0f6e56;font-size:11px;font-weight:700;
  padding:4px 10px;border-radius:20px;margin-top:6px;
}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px}
.form-group input{
  width:100%;padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:10px;
  font-size:14px;font-family:'Poppins',sans-serif;outline:none;transition:border-color .15s;
}
.form-group input:focus{border-color:#0f6e56;box-shadow:0 0 0 3px rgba(15,110,86,.1)}
.login-btn{
  width:100%;padding:13px;background:linear-gradient(135deg,#0f6e56,#1e3a5f);
  color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;
  font-family:'Poppins',sans-serif;cursor:pointer;transition:all .2s;margin-top:.5rem;
  letter-spacing:.02em;
}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(15,110,86,.35)}
.login-btn:disabled{opacity:.6;transform:none;cursor:default}
.login-error{color:#dc2626;font-size:12px;text-align:center;margin-top:.75rem;display:none;background:#fee2e2;padding:8px 12px;border-radius:8px}
.login-back{text-align:center;margin-top:1.2rem;font-size:12px;color:#6b7280}
.login-back a{color:#0f6e56;font-weight:600;text-decoration:none}

/* ══ JOUR 9 — OTP SMS ══ */
.login-tabs{display:flex;background:#f3f4f6;border-radius:10px;padding:4px;margin-bottom:1.5rem;gap:4px}
.login-tab{flex:1;padding:8px;border-radius:7px;font-size:12.5px;font-weight:600;cursor:pointer;color:#6b7280;border:none;background:transparent;font-family:'Poppins',sans-serif;transition:all .15s}
.login-tab.active{background:#fff;color:#0f6e56;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.otp-input-wrap{display:flex;gap:8px;justify-content:center;margin:1rem 0}
.otp-digit{width:44px;height:52px;border:2px solid #e5e7eb;border-radius:10px;font-size:22px;font-weight:700;text-align:center;font-family:'Nunito',sans-serif;color:#1e3a5f;outline:none;transition:border-color .15s}
.otp-digit:focus{border-color:#0f6e56;box-shadow:0 0 0 3px rgba(15,110,86,.1)}
.otp-digit.filled{border-color:#0f6e56;background:#f0fdf4}
.otp-timer{text-align:center;font-size:12px;color:#6b7280;margin-bottom:.5rem}
.otp-timer span{font-weight:700;color:#0f6e56}
.phone-flag{display:flex;align-items:center;gap:6px;background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:10px;padding:11px 14px;font-size:14px;font-family:'Poppins',sans-serif;width:100%;outline:none;transition:border-color .15s}
.phone-flag:focus-within{border-color:#0f6e56;box-shadow:0 0 0 3px rgba(15,110,86,.1)}
.phone-flag .flag{font-size:18px;flex-shrink:0}
.phone-flag .prefix{color:#6b7280;font-weight:600;flex-shrink:0}
.phone-flag input{border:none;outline:none;flex:1;font-size:14px;font-family:'Poppins',sans-serif;background:transparent}


/* ══ APP ══ */
#app-portail{display:none;max-width:500px;margin:0 auto;min-height:100vh;padding-bottom:80px}

/* ══ HEADER ══ */
.portail-header{
  background:linear-gradient(135deg,#0f6e56,#1e3a5f);
  padding:1.2rem 1.2rem .8rem;position:sticky;top:0;z-index:100;
}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem}
.header-logo{font-family:'Nunito',sans-serif;font-size:18px;font-weight:800;color:#fff;display:flex;align-items:center;gap:6px}
.header-actions{display:flex;gap:8px;align-items:center}
.notif-btn{
  width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);
  border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  position:relative;
}
.notif-badge{
  position:absolute;top:-2px;right:-2px;width:16px;height:16px;
  background:#dc2626;border-radius:50%;font-size:9px;font-weight:700;
  color:#fff;display:none;align-items:center;justify-content:center;border:2px solid #0f6e56;
}
.header-greeting{color:rgba(255,255,255,.85);font-size:12.5px}
.header-greeting strong{color:#fff;font-size:14px;display:block;font-weight:700}
.student-pill{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);
  border-radius:20px;padding:4px 12px;font-size:11.5px;color:#fff;font-weight:600;margin-top:4px;
}

/* ══ NAV BAS ══ */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:500px;
  background:#fff;border-top:1px solid #e5e7eb;
  display:flex;z-index:100;
  box-shadow:0 -4px 20px rgba(0,0,0,.08);
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:10px 4px 8px;cursor:pointer;color:#9ca3af;transition:color .15s;
  border:none;background:transparent;font-family:'Poppins',sans-serif;
}
.nav-item.active{color:#0f6e56}
.nav-item .nav-ico{font-size:20px;margin-bottom:2px;line-height:1}
.nav-item .nav-lbl{font-size:9.5px;font-weight:600}
.nav-badge{
  position:absolute;top:6px;right:50%;transform:translateX(50%);
  width:16px;height:16px;background:#dc2626;border-radius:50%;
  font-size:9px;font-weight:700;color:#fff;display:none;align-items:center;justify-content:center;
}
.nav-item{position:relative}

/* ══ PAGES ══ */
.page{display:none;padding:1rem 1rem 0;animation:fadeUp .2s ease}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ══ CARDS ══ */
.card{background:#fff;border-radius:var(--radius);border:1px solid #e5e7eb;margin-bottom:1rem;overflow:hidden}
.card-header{padding:.9rem 1rem .6rem;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:700;color:#374151;display:flex;align-items:center;gap:6px}
.card-body{padding:1rem}
.card-link{font-size:11.5px;color:#0f6e56;font-weight:600;text-decoration:none;cursor:pointer}

/* ══ STATS ACCUEIL ══ */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem}
.stat-card{
  background:#fff;border-radius:14px;border:1px solid #e5e7eb;
  padding:.9rem;display:flex;align-items:center;gap:.75rem;
}
.stat-ico{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.stat-ico.teal{background:#e1f5ee}
.stat-ico.red{background:#fee2e2}
.stat-ico.amber{background:#fef9c3}
.stat-ico.blue{background:#dbeafe}
.stat-val{font-size:22px;font-weight:800;font-family:'Nunito',sans-serif;line-height:1}
.stat-lbl{font-size:10.5px;color:#6b7280;font-weight:500}

/* ══ BADGES ══ */
.badge{font-size:10.5px;padding:2px 8px;border-radius:20px;font-weight:700;white-space:nowrap;display:inline-block}
.badge.green{background:#dcfce7;color:#059669}
.badge.red{background:#fee2e2;color:#dc2626}
.badge.amber{background:#fef9c3;color:#d97706}
.badge.blue{background:#dbeafe;color:#1d4ed8}
.badge.gray{background:#f3f4f6;color:#6b7280}
.badge.teal{background:#e1f5ee;color:#0f6e56}

/* ══ LISTES ══ */
.list-item{
  padding:.85rem 1rem;border-bottom:1px solid #f3f4f6;
  display:flex;align-items:flex-start;gap:.75rem;
}
.list-item:last-child{border-bottom:none}
.li-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.li-body{flex:1;min-width:0}
.li-title{font-size:13px;font-weight:600;color:#111827;margin-bottom:2px}
.li-sub{font-size:11.5px;color:#6b7280}
.li-right{text-align:right;flex-shrink:0}

/* ══ NOTES ══ */
.note-big{font-size:28px;font-weight:800;font-family:'Nunito',sans-serif}
.note-big.good{color:#059669}
.note-big.avg{color:#d97706}
.note-big.bad{color:#dc2626}
.moy-bar{height:8px;background:#e5e7eb;border-radius:4px;margin:8px 0 4px;overflow:hidden}
.moy-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#0f6e56,#1d9e75);transition:width .8s ease}

/* ══ BULLETIN ══ */
.bulletin-card{background:#fff;border-radius:14px;overflow:hidden;border:1px solid #e5e7eb;margin-bottom:1rem}
.bulletin-top{background:linear-gradient(135deg,#1e3a5f,#0f6e56);padding:1rem 1.2rem;color:#fff}
.bulletin-top h3{font-size:15px;font-weight:700;margin-bottom:2px}
.bulletin-top p{font-size:11.5px;opacity:.75}
.bulletin-moy{font-size:32px;font-weight:800;font-family:'Nunito',sans-serif;margin:.5rem 0}
.bulletin-table{width:100%;border-collapse:collapse}
.bulletin-table th{font-size:10px;font-weight:700;color:#6b7280;padding:8px 12px;text-align:left;border-bottom:1px solid #e5e7eb;text-transform:uppercase;background:#f9fafb}
.bulletin-table td{font-size:12.5px;padding:9px 12px;border-bottom:1px solid #f3f4f6;color:#374151}
.bulletin-table tr:last-child td{border-bottom:none}
.periode-sel{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.periode-btn{
  padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;
  border:1.5px solid #e5e7eb;background:#fff;color:#6b7280;cursor:pointer;
  font-family:'Poppins',sans-serif;transition:all .15s;
}
.periode-btn.active{background:#0f6e56;border-color:#0f6e56;color:#fff}
.print-btn{
  width:100%;padding:11px;background:#1e3a5f;color:#fff;border:none;
  border-radius:10px;font-size:13px;font-weight:600;font-family:'Poppins',sans-serif;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:1rem;
}

/* ══ MESSAGES ══ */
.msg-composer{margin-bottom:1rem}
.msg-composer textarea{
  width:100%;padding:10px 12px;border:1.5px solid #e5e7eb;border-radius:10px;
  font-size:13px;font-family:'Poppins',sans-serif;outline:none;resize:none;
  transition:border-color .15s;
}
.msg-composer textarea:focus{border-color:#0f6e56}
.msg-send-btn{
  margin-top:6px;padding:9px 18px;background:#0f6e56;color:#fff;border:none;
  border-radius:8px;font-size:12.5px;font-weight:600;font-family:'Poppins',sans-serif;cursor:pointer;
}
.msg-bubble{
  background:#f0f7f4;border-radius:12px 12px 12px 4px;
  padding:.75rem 1rem;margin-bottom:.75rem;border-left:3px solid #0f6e56;
}
.msg-bubble.sent{background:#e1f5ee;border-left-color:#1d9e75;border-radius:12px 12px 4px 12px}
.msg-bubble .mb-from{font-size:11px;font-weight:700;color:#0f6e56;margin-bottom:3px}
.msg-bubble .mb-text{font-size:13px;color:#374151;line-height:1.6}
.msg-bubble .mb-date{font-size:10.5px;color:#9ca3af;margin-top:4px;text-align:right}

/* ══ PAIEMENTS ══ */
.pay-progress{margin:1rem 0}
.pay-bar{height:10px;background:#e5e7eb;border-radius:5px;overflow:hidden;margin-top:6px}
.pay-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,#059669,#1d9e75);transition:width .8s}
.pay-amounts{display:flex;justify-content:space-between;font-size:11px;color:#6b7280;margin-top:4px}



/* ══ ENSEIGNANTS PORTAIL ★ JOUR 13 ══ */
.prof-contact-card{
  background:linear-gradient(135deg,#1e3a5f,#2d5a8e);
  border-radius:14px;color:#fff;padding:1rem 1.2rem;
  display:flex;align-items:center;gap:1rem;margin-bottom:.75rem;
}
.pcc-avatar{
  width:44px;height:44px;border-radius:12px;
  background:rgba(255,255,255,.2);display:flex;
  align-items:center;justify-content:center;
  font-size:17px;font-weight:700;flex-shrink:0;
}
.pcc-info .pi-nom{font-size:13.5px;font-weight:700;margin-bottom:2px;}
.pcc-info .pi-spec{font-size:11.5px;opacity:.75;}
.pcc-info .pi-mat{font-size:11px;opacity:.6;margin-top:2px;}


/* ══ ENSEIGNANTS PORTAIL ★ JOUR 13 ══ */
.prof-card{
  display:flex;align-items:center;gap:.85rem;
  padding:.9rem 1rem;border-bottom:1px solid #f3f4f6;
}
.prof-card:last-child{border-bottom:none}
.prof-avatar{
  width:44px;height:44px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#0f6e56,#1e3a5f);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;color:#fff;
}
.prof-body{flex:1;min-width:0}
.prof-nom{font-size:13px;font-weight:700;color:#111827;margin-bottom:2px}
.prof-spec{font-size:11.5px;color:#6b7280}
.prof-mats{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.prof-mat-pill{
  background:#e1f5ee;color:#0f6e56;border-radius:20px;
  padding:2px 8px;font-size:10.5px;font-weight:600;
}

/* ══ EXAMENS PORTAIL ★ JOUR 12 ══ */
.next-exam-card{
  background:linear-gradient(135deg,#0f6e56,#1e3a5f);
  border-radius:16px;padding:1.2rem;color:#fff;margin-bottom:1rem;
  position:relative;overflow:hidden;
}
.next-exam-card::after{content:'📝';position:absolute;right:1rem;top:50%;transform:translateY(-50%);font-size:52px;opacity:.1;}
.nec-countdown{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.15);border-radius:20px;
  padding:4px 12px;font-size:12px;font-weight:700;margin-bottom:8px;
}
.nec-mat{font-size:17px;font-weight:700;margin-bottom:4px;}
.nec-meta{font-size:12px;opacity:.75;display:flex;gap:12px;flex-wrap:wrap;}
.exam-item{
  padding:.9rem 1rem;border-bottom:1px solid #f3f4f6;
  display:flex;align-items:flex-start;gap:.75rem;
}
.exam-item:last-child{border-bottom:none}
.exam-date-box{
  width:46px;flex-shrink:0;text-align:center;
  background:#f0f7f4;border-radius:10px;padding:6px 4px;
}
.exam-date-box .ed-day{font-size:20px;font-weight:800;color:#0f6e56;font-family:'Nunito',sans-serif;line-height:1;}
.exam-date-box .ed-mon{font-size:9px;font-weight:700;color:#6b7280;text-transform:uppercase;}
.exam-body{flex:1;min-width:0;}
.exam-body .eb-mat{font-size:13px;font-weight:700;color:#111827;margin-bottom:2px;}
.exam-body .eb-meta{font-size:11.5px;color:#6b7280;display:flex;gap:8px;flex-wrap:wrap;}
.exam-body .eb-note{font-size:11.5px;margin-top:4px;background:#f0f7f4;border-radius:6px;padding:3px 8px;display:inline-block;color:#0f6e56;font-weight:600;}
.exam-pill{
  padding:3px 10px;border-radius:20px;font-size:10.5px;font-weight:700;white-space:nowrap;
  flex-shrink:0;align-self:center;
}
.ep-partiel{background:#fee2e2;color:#dc2626;}
.ep-controle{background:#dbeafe;color:#1d4ed8;}
.ep-final{background:#fee2e2;color:#dc2626;}
.ep-rattrapage{background:#fef9c3;color:#d97706;}
.ep-soutenance{background:#ede9fe;color:#7c3aed;}
.ep-soon{background:#dc2626;color:#fff;}
.exam-filter-bar{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;}
.exam-filter-btn{
  padding:5px 12px;border-radius:20px;font-size:11.5px;font-weight:600;
  border:1.5px solid #e5e7eb;background:#fff;color:#6b7280;
  cursor:pointer;font-family:'Poppins',sans-serif;transition:all .15s;
}
.exam-filter-btn.active{background:#0f6e56;border-color:#0f6e56;color:#fff;}


/* ══ CENTRE NOTIFICATIONS PORTAIL ★ JOUR 16 ══ */
.pn-empty{text-align:center;padding:3rem 1rem;color:#9ca3af}
.pn-empty .pn-ico{font-size:44px;margin-bottom:.75rem}
.pn-empty p{font-size:13px}

.pn-item{
  display:flex;align-items:flex-start;gap:.75rem;
  padding:.9rem 1rem;border-bottom:1px solid #f3f4f6;
  cursor:pointer;transition:background .1s;
  position:relative;
}
.pn-item:last-child{border-bottom:none}
.pn-item:hover{background:#fafafa}
.pn-item.unread{background:#eff6ff;border-left:3px solid #1e3a5f}
.pn-item.high{border-left:3px solid #dc2626!important}

.pn-dot{
  width:8px;height:8px;border-radius:50%;
  background:#1e3a5f;position:absolute;top:1rem;right:1rem;
  flex-shrink:0;
}
.pn-item.unread .pn-dot{display:block}
.pn-item:not(.unread) .pn-dot{display:none}

.pn-ico-wrap{
  width:38px;height:38px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
}
.pn-ico-wrap.blue  {background:#dbeafe}
.pn-ico-wrap.green {background:#dcfce7}
.pn-ico-wrap.red   {background:#fee2e2}
.pn-ico-wrap.amber {background:#fef9c3}
.pn-ico-wrap.purple{background:#ede9fe}
.pn-ico-wrap.teal  {background:#e1f5ee}

.pn-body{flex:1;min-width:0}
.pn-titre{font-size:13px;font-weight:600;color:#111827;margin-bottom:2px}
.pn-item.unread .pn-titre{color:#1e3a5f}
.pn-corps{font-size:12px;color:#6b7280;line-height:1.5;margin-bottom:3px}
.pn-meta{font-size:10.5px;color:#9ca3af;display:flex;gap:8px;align-items:center}
.pn-type-pill{
  font-size:9.5px;font-weight:700;padding:1px 7px;border-radius:10px;
}

.pn-filter-bar{
  display:flex;gap:6px;padding:.65rem 1rem;
  border-bottom:1px solid #f3f4f6;overflow-x:auto;
  scrollbar-width:none;
}

<script>
// ══ SUPABASE ══
const SUPABASE_URL = 'https://wpexhfngdbagmgodgzzt.supabase.co';
const SUPABASE_KEY = 'sb_publishable_8e4xKWS3YpfwGFAQlZ7lgQ_9hDx8ljQ';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// ══ ÉTAT ══
let currentUser = null;
let currentProfile = null;
let currentEtudiant = null;
let currentEcoleId = null;
let toutesNotes = [];
let toutesAbsences = [];
let toutesFactures = [];
let tousMessages = [];
let tousExamens = [];
let examFilterActif = 'tous';
let tousEnseignantsPortail = [];
// tousEnseignantsPortail déclaré plus haut

// ══ UTILS ══
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3500);
}
function fmtDate(d) { return d ? new Date(d).toLocaleDateString('fr-FR') : '—'; }
function fmtMontant(n) { return new Intl.NumberFormat('fr-FR').format(n||0) + ' FCFA'; }
function getApp(note) {
  if (note >= 16) return { label:'Très bien', cls:'green' };
  if (note >= 14) return { label:'Bien', cls:'green' };
  if (note >= 12) return { label:'Assez bien', cls:'blue' };
  if (note >= 10) return { label:'Passable', cls:'amber' };
  return { label:'Insuffisant', cls:'red' };
}
function getNoteClass(note) {
  if (note >= 14) return 'good';
  if (note >= 10) return 'avg';
  return 'bad';
}

// ══ AUTH ══
async function seConnecter() {
  const email = document.getElementById('login-email').value.trim();
  const pwd   = document.getElementById('login-pwd').value;
  const btn   = document.getElementById('login-btn');
  const err   = document.getElementById('login-error');
  if (!email || !pwd) { err.style.display='block'; err.textContent='Remplissez tous les champs.'; return; }
  btn.disabled = true; btn.textContent = 'Connexion...'; err.style.display = 'none';
  const { data, error } = await db.auth.signInWithPassword({ email, password: pwd });
  if (error) {
    err.style.display = 'block';
    err.textContent = error.message.includes('Invalid') ? 'Email ou mot de passe incorrect.' : error.message;
    btn.disabled = false; btn.textContent = 'Se connecter →'; return;
  }
  currentUser = data.user;
  await chargerProfil();
}

async function chargerProfil() {
  const { data: profile } = await db.from('profiles').select('*').eq('id', currentUser.id).single();
  currentProfile = profile;
  if (!profile || !['parent','etudiant'].includes(profile.role)) {
    await db.auth.signOut();
    const err = document.getElementById('login-error');
    err.style.display = 'block';
    err.textContent = 'Accès réservé aux parents et étudiants. Utilisez le back-office.';
    document.getElementById('login-btn').disabled = false;
    document.getElementById('login-btn').textContent = 'Se connecter →';
    return;
  }
  await chargerEtudiantLie();
  lancerApp();
}

async function chargerEtudiantLie() {
  // Si étudiant → chercher son profil dans la table étudiants via email
  // Si parent → chercher via etudiant_id du profil
  let etudiant = null;
  if (currentProfile.role === 'etudiant') {
    const { data } = await db.from('etudiants').select('*').eq('email', currentUser.email).single();
    etudiant = data;
  } else if (currentProfile.etudiant_id) {
    const { data } = await db.from('etudiants').select('*').eq('id', currentProfile.etudiant_id).single();
    etudiant = data;
  } else {
    // Fallback : chercher par email de l'user
    const { data } = await db.from('etudiants').select('*').eq('email', currentUser.email).maybeSingle();
    etudiant = data;
  }
  currentEtudiant = etudiant;
  if (etudiant) currentEcoleId = etudiant.ecole_id;
}

function lancerApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-portail').style.display = 'block';
  // Header
  const nom = currentProfile ? currentProfile.prenom + ' ' + currentProfile.nom : currentUser.email;
  document.getElementById('greeting-nom').textContent = nom;
  document.getElementById('greeting-role').textContent = currentProfile?.role === 'parent' ? 'Espace parent' : 'Espace étudiant';
  if (currentEtudiant) {
    document.getElementById('student-pill-wrap').innerHTML =
      `<div class="student-pill">👨‍🎓 ${currentEtudiant.nom} ${currentEtudiant.prenom} · ${currentEtudiant.filiere} ${currentEtudiant.niveau}</div>`;
  }
  chargerTout();
  // Initialiser FCM après connexion
  setTimeout(initFCMPortail, 1500);
}

async function chargerTout() {
  await Promise.all([chargerNotes(), chargerAbsences(), chargerFactures(), chargerMessages(), chargerExamensPortail(), chargerEnseignantsPortail(), chargerNotifsPortail()]);
  afficherAccueil();
}

async function seDeconnecter() {
  await db.auth.signOut();
  location.reload();
}

// ══ DATA ══
async function chargerNotes() {
  if (!currentEtudiant) { toutesNotes = []; return; }
  const { data } = await db.from('notes').select('*').eq('etudiant_id', currentEtudiant.id).order('created_at',{ascending:false});
  toutesNotes = data || [];
}
async function chargerAbsences() {
  if (!currentEtudiant) { toutesAbsences = []; return; }
  const { data } = await db.from('absences').select('*').eq('etudiant_id', currentEtudiant.id).order('date_absence',{ascending:false});
  toutesAbsences = data || [];
}
async function chargerFactures() {
  if (!currentEtudiant) { toutesFactures = []; return; }
  const { data } = await db.from('factures').select('*').eq('etudiant_id', currentEtudiant.id).order('created_at',{ascending:false});
  toutesFactures = data || [];
}
async function chargerMessages() {
  let q = db.from('messages').select('*').order('created_at',{ascending:false}).limit(20);
  if (currentEcoleId) q = q.eq('ecole_id', currentEcoleId);
  const { data } = await q;
  tousMessages = data || [];
  const nonLus = tousMessages.filter(m => !m.lu).length;
  const b1 = document.getElementById('msg-badge');
  const b2 = document.getElementById('nav-msg-badge');
  if (nonLus > 0) {
    b1.style.display = 'flex'; b1.textContent = nonLus;
    b2.style.display = 'flex'; b2.textContent = nonLus;
  }
}

// ══ NAVIGATION ══
function showPage(p) {
  document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
  document.getElementById('page-' + p)?.classList.add('active');
  document.getElementById('nav-' + p)?.classList.add('active');
  const renderers = {
    accueil: afficherAccueil,
    notes: afficherNotes,
    absences: afficherAbsences,
    paiements: afficherPaiements,
    messages: afficherMessages,
    examens: afficherExamensPortail,
    enseignants: afficherEnseignantsPortail,
    notifs: afficherNotifsPortail,
  };
  if (renderers[p]) renderers[p]();
}

// ══ ACCUEIL ══
function afficherAccueil() {
  const page = document.getElementById('page-accueil');
  // Calcul stats
  const nbAbsences = toutesAbsences.filter(a => a.statut === 'absent').length;
  let moy = 0;
  if (toutesNotes.length) {
    let pts = 0, coeff = 0;
    toutesNotes.forEach(n => { pts += n.note*(n.coefficient||1); coeff += (n.coefficient||1); });
    moy = coeff > 0 ? pts/coeff : 0;
  }
  const totalDu = toutesFactures.reduce((s,f) => s+f.montant_total, 0);
  const totalPaye = toutesFactures.reduce((s,f) => s+(f.montant_paye||0), 0);
  const restant = totalDu - totalPaye;
  const nonLusMsgs = tousMessages.filter(m => !m.lu).length;

  page.innerHTML = `
    <div style="padding:1rem 1rem 0">
      <!-- Stat cards -->
      <div class="stat-grid">
        <div class="stat-card" onclick="showPage('notes')">
          <div class="stat-ico teal">📊</div>
          <div>
            <div class="stat-val" style="color:${moy>=10?'#059669':'#dc2626'}">${toutesNotes.length?moy.toFixed(1)+'/20':'—'}</div>
            <div class="stat-lbl">Moyenne générale</div>
          </div>
        </div>
        <div class="stat-card" onclick="showPage('absences')">
          <div class="stat-ico red">🚫</div>
          <div>
            <div class="stat-val" style="color:#dc2626">${nbAbsences}</div>
            <div class="stat-lbl">Absences</div>
          </div>
        </div>
        <div class="stat-card" onclick="showPage('paiements')">
          <div class="stat-ico amber">💳</div>
          <div>
            <div class="stat-val" style="color:${restant>0?'#d97706':'#059669'};font-size:16px">${restant>0?'Impayé':'À jour'}</div>
            <div class="stat-lbl">${restant>0?fmtMontant(restant):'Paiements'}</div>
          </div>
        </div>
        <div class="stat-card" onclick="showPage('examens')">
          <div class="stat-ico blue">📝</div>
          <div>
            <div class="stat-val" style="color:#7c3aed">${(()=>{const t=new Date().toISOString().split('T')[0];return tousExamens.filter(e=>e.date_examen>=t&&e.statut!=='annule').length;})()||0}</div>
            <div class="stat-lbl">Examens à venir</div>
          </div>
        </div>
      </div>

      <!-- Dernières notes -->
      ${toutesNotes.length ? `
      <div class="card">
        <div class="card-header">
          <div class="card-title">📊 Dernières notes</div>
          <span class="card-link" onclick="showPage('notes')">Tout voir</span>
        </div>
        ${toutesNotes.slice(0,3).map(n => {
          const a = getApp(n.note);
          return `<div class="list-item">
            <div class="li-ico" style="background:${n.note>=10?'#e1f5ee':'#fee2e2'}">${n.note>=10?'✅':'⚠️'}</div>
            <div class="li-body">
              <div class="li-title">${n.matiere}</div>
              <div class="li-sub">${n.periode} · Coeff. ${n.coefficient||1}${(()=>{const pr=getProfPourMatiere(n.matiere);return pr?' · 👨‍🏫 '+pr.nom:'';})()}</div>
            </div>
            <div class="li-right">
              <div class="note-big ${getNoteClass(n.note)}" style="font-size:20px">${n.note}/20</div>
              <div><span class="badge ${a.cls}">${a.label}</span></div>
            </div>
          </div>`;
        }).join('')}
      </div>` : ''}

      <!-- Absences récentes -->
      ${toutesAbsences.length ? `
      <div class="card">
        <div class="card-header">
          <div class="card-title">🚫 Absences récentes</div>
          <span class="card-link" onclick="showPage('absences')">Tout voir</span>
        </div>
        ${toutesAbsences.slice(0,3).map(a => `
          <div class="list-item">
            <div class="li-ico" style="background:${a.statut==='absent'?'#fee2e2':a.statut==='retard'?'#fef9c3':'#dbeafe'}">
              ${a.statut==='absent'?'🔴':a.statut==='retard'?'🟡':'🟢'}
            </div>
            <div class="li-body">
              <div class="li-title">${a.matiere}</div>
              <div class="li-sub">${fmtDate(a.date_absence)}</div>
            </div>
            <span class="badge ${a.statut==='absent'?'red':a.statut==='retard'?'amber':'blue'}">${a.statut}</span>
          </div>`).join('')}
      </div>` : ''}

      <!-- Factures en attente -->
      ${toutesFactures.filter(f=>f.statut!=='payée').length ? `
      <div class="card">
        <div class="card-header">
          <div class="card-title">💳 Paiements en attente</div>
          <span class="card-link" onclick="showPage('paiements')">Détails</span>
        </div>
        ${toutesFactures.filter(f=>f.statut!=='payée').slice(0,2).map(f => `
          <div class="list-item">
            <div class="li-ico" style="background:#fef9c3">💰</div>
            <div class="li-body">
              <div class="li-title">${f.description||f.type_frais||'Facture'}</div>
              <div class="li-sub">Échéance : ${fmtDate(f.date_echeance)}</div>
            </div>
            <div class="li-right">
              <div style="font-size:13px;font-weight:700;color:#d97706">${fmtMontant(f.montant_total-(f.montant_paye||0))}</div>
              <span class="badge amber">À payer</span>
            </div>
          </div>`).join('')}
      </div>` : ''}

      ${(function(){
        const today = new Date().toISOString().split('T')[0];
        const prochain = tousExamens.find(function(e){ return e.date_examen >= today && e.statut !== 'annule' && e.statut !== 'termine'; });

          '</div></div></div>';
      })()}

function afficherNotes() {
  const page = document.getElementById('page-notes');
  if (!currentEtudiant) { page.innerHTML = '<div class="empty"><div class="e-ico">📊</div><p>Aucun étudiant lié à ce compte.</p></div>'; return; }

  // Toutes les périodes y compris EXAM-xxx
  const periodes = [...new Set(toutesNotes.map(n => n.periode))].sort();
  // Trier : S1/S2/T1... en premier, EXAM-xxx à la fin
  periodes.sort((a,b) => {
    const aExam = a.startsWith('EXAM-');
    const bExam = b.startsWith('EXAM-');
    if (aExam && !bExam) return 1;
    if (!aExam && bExam) return -1;
    return a.localeCompare(b);
  });

  // Libellé lisible pour les périodes
  function labelPeriode(p) {
    if (!p) return 'Toutes';
    if (p === 'S1') return 'Semestre 1';
    if (p === 'S2') return 'Semestre 2';
    if (p === 'T1') return 'Trimestre 1';
    if (p === 'T2') return 'Trimestre 2';
    if (p === 'T3') return 'Trimestre 3';
    if (p.startsWith('EXAM-')) return '📝 Examen';
    return p;
  }

  // Ajouter "Toutes" si plusieurs périodes
  const periodesAvecTout = periodes.length > 1 ? ['', ...periodes] : periodes;
  let periodeActive = periodes[0] || '';

  function renderNotes(periode) {
    const notes = periode ? toutesNotes.filter(n => n.periode === periode) : toutesNotes;
    let moy = 0, totalPts = 0, totalCoeff = 0;
    notes.forEach(n => { totalPts += n.note*(n.coefficient||1); totalCoeff += (n.coefficient||1); });
    moy = totalCoeff > 0 ? totalPts/totalCoeff : 0;
    const app = getApp(moy);

    return `
      ${notes.length ? `

          <h3>${currentEtudiant.nom} ${currentEtudiant.prenom}</h3>

          <div style="margin-top:8px">
            <div class="moy-bar"><div class="moy-fill" style="width:${Math.min(100,moy/20*100)}%"></div></div>
          </div>
        </div>
        <table class="bulletin-table">
          <tr><th>Matière</th><th>Note</th><th>Coeff</th><th>Mention</th></tr>
          ${notes.map(n => { const a=getApp(n.note); return `
            <tr>
              <td>${n.matiere}</td>
              <td><strong class="${getNoteClass(n.note)==='good'?'':''}"; style="color:${n.note>=10?'#059669':'#dc2626'}">${n.note}/20</strong></td>

            </tr>`}).join('')}
          <tr style="background:#f9fafb;font-weight:700">
            <td>Moyenne générale</td>
            <td style="color:${moy>=10?'#059669':'#dc2626'};font-weight:800">${moy.toFixed(2)}/20</td>
            <td>${totalCoeff}</td>
            <td><span class="badge ${app.cls}">${app.label}</span></td>
          </tr>
        </table>
        <div style="padding:1rem">
          <div style="display:flex;gap:8px;margin-top:1rem">
          <button class="print-btn" style="flex:1" onclick="imprimerBulletin('${periode}')">🖨️ Imprimer</button>

  page.innerHTML = `<div class="page-pad">

    ${periodesAvecTout.length > 1 ? `<div class="periode-sel" id="periode-sel">

    </div>` : ''}
    <div id="notes-container">${renderNotes(periodeActive)}</div>
  </div>`;

  window.changerPeriode = function(p) {
    periodeActive = p;
    document.querySelectorAll('.periode-btn').forEach(b => b.classList.toggle('active', b.textContent===(labelPeriode(p)||'Toutes')));

async function envoyerMessage() {

  const { error } = await db.from('messages').insert([{
    ecole_id: currentEcoleId,
    expediteur_nom: nom,
    expediteur_role: currentProfile?.role || 'parent',

async function rendreListeExamensPortail() {
  const container = document.getElementById('exam-liste-portail');
  if (!container) return;
  const today = new Date().toISOString().split('T')[0];

  let liste = [...tousExamens];
  if (examFilterActif === 'avenir') liste = liste.filter(e => e.date_examen >= today && e.statut !== 'annule');
  else if (examFilterActif === 'passe') liste = liste.filter(e => e.date_examen < today || e.statut === 'termine');

  if (!liste.length) {
    container.innerHTML = '<div class="empty"><div class="e-ico">📭</div><p>Aucun examen dans cette catégorie.</p></div>';
    return;
  }

  const typeLabels = { controle:'Contrôle continu', partiel:'Partiel', final:'Examen final', rattrapage:'Rattrapage', soutenance:'Soutenance' };
  const typeClass  = { controle:'ep-controle', partiel:'ep-partiel', final:'ep-final', rattrapage:'ep-rattrapage', soutenance:'ep-soutenance' };
  const moisFr = ['JAN','FÉV','MAR','AVR','MAI','JUN','JUL','AOÛ','SEP','OCT','NOV','DÉC'];

  // Charger les notes de l'étudiant pour les examens terminés
  let notesMap = {};
  if (currentEtudiant) {
    const examinesTermines = liste.filter(e => e.statut === 'termine').map(e => 'EXAM-' + e.id);
    if (examinesTermines.length) {
      const { data: notesEx } = await db.from('notes').select('*')
        .eq('etudiant_id', currentEtudiant.id)
        .in('periode', examinesTermines);
      (notesEx || []).forEach(n => {
        const examId = n.periode.replace('EXAM-', '');
        notesMap[examId] = n.note;
      });
    }
  }

  container.innerHTML = liste.map(ex => {
    const d = new Date(ex.date_examen);
    const day = d.getDate().toString().padStart(2,'0');
    const mon = moisFr[d.getMonth()];
    const jours = Math.ceil((new Date(ex.date_examen) - new Date(today)) / 86400000);
    const isPasse = ex.date_examen < today || ex.statut === 'termine';
    const note = notesMap[ex.id];
    let pillHtml = '';
    if (ex.statut === 'annule') pillHtml = `<span class="exam-pill" style="background:#f3f4f6;color:#6b7280">Annulé</span>`;
    else if (isPasse && note !== undefined) pillHtml = `<span class="exam-pill" style="background:${note>=10?'#dcfce7':'#fee2e2'};color:${note>=10?'#059669':'#dc2626'}">${note}/20</span>`;
    else if (!isPasse && jours <= 3) pillHtml = `<span class="exam-pill ep-soon">${jours===0?'Auj.':'J-'+jours}</span>`;
    else if (!isPasse) pillHtml = `<span class="exam-pill" style="background:#e1f5ee;color:#0f6e56">J-${jours}</span>`;

    return `<div class="exam-item">
      <div class="exam-date-box">
        <div class="ed-day">${day}</div>
        <div class="ed-mon">${mon}</div>
      </div>
      <div class="exam-body">
        <div class="eb-mat">${ex.matiere}</div>
        <div class="eb-meta">
          ${ex.heure_debut ? `<span>🕐 ${ex.heure_debut}${ex.heure_fin?'–'+ex.heure_fin:''}</span>`:''}
          ${ex.salle ? `<span>📍 ${ex.salle}</span>`:''}
          ${ex.surveillant ? `<span>👤 ${ex.surveillant}</span>`:''}
        </div>
        ${ex.instructions ? `<div class="eb-note">📋 ${ex.instructions.slice(0,60)}${ex.instructions.length>60?'…':''}</div>` : ''}
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end;flex-shrink:0">
        <span class="exam-pill ${typeClass[ex.type_examen]||'ep-controle'}">${typeLabels[ex.type_examen]||ex.type_examen}</span>
        ${pillHtml}
      </div>
    </div>`;
  }).join('');
}

// ══ PDF PORTAIL FAMILLE  ★ JOUR 14 ══════════════════════════════════

function getJsPDFPortail() {
  if (typeof window !== 'undefined' && window.jspdf) return window.jspdf.jsPDF;
  if (typeof jspdf !== 'undefined') return jspdf.jsPDF;
  return null;
}

function pdfSafePortail(str) {
  if (!str) return '';
  return str
    .replace(/é|è|ê|ë/g, 'e')
    .replace(/à|â|ä/g, 'a')
    .replace(/î|ï/g, 'i')
    .replace(/ô|ö/g, 'o')
    .replace(/ù|û|ü/g, 'u')
    .replace(/ç/g, 'c')
    .replace(/É|È|Ê|Ë/g, 'E')
    .replace(/À|Â|Ä/g, 'A')
    .replace(/Î|Ï/g, 'I')
    .replace(/Ô|Ö/g, 'O')
    .replace(/Ù|Û|Ü/g, 'U')
    .replace(/Ç/g, 'C')
    .replace(/[-￿]/g, '');
}

function labelPeriodePDF(p) {
  if (!p) return 'Toutes periodes';
  if (p === 'S1') return 'Semestre 1';
  if (p === 'S2') return 'Semestre 2';
  if (p === 'T1') return 'Trimestre 1';
  if (p === 'T2') return 'Trimestre 2';
  if (p === 'T3') return 'Trimestre 3';
  if (p.startsWith('EXAM-')) return 'Examen';
  return p;
}

async function telechargerBulletinPDFPortail(periode) {
  const JsPDF = getJsPDFPortail();
  if (!JsPDF) { showToast('jsPDF non chargé — réessayez', 'error'); return; }
  if (!currentEtudiant) { showToast('Aucun étudiant lié', 'error'); return; }

  showToast('Génération du PDF...', 'info');

  const notes = periode ? toutesNotes.filter(n => n.periode === periode) : toutesNotes;
  if (!notes.length) { showToast('Aucune note pour cette période', 'error'); return; }

  let totalPts = 0, totalCoeff = 0;
  notes.forEach(n => { totalPts += n.note*(n.coefficient||1); totalCoeff += (n.coefficient||1); });
  const moy = totalCoeff > 0 ? totalPts/totalCoeff : 0;

  const NAVY  = [15, 110, 86];   // teal portail
  const NAVY2 = [30, 58, 95];
  const GREEN = [5, 150, 105];
  const RED   = [220, 38, 38];
  const AMBER = [217, 119, 6];
  const GRAY  = [107, 114, 128];

  function mentionColor(note) { return note>=14?GREEN:note>=10?AMBER:RED; }
  function mentionLabel(note) {
    if (note>=16) return 'Tres bien';
    if (note>=14) return 'Bien';
    if (note>=12) return 'Assez bien';
    if (note>=10) return 'Passable';
    return 'Insuffisant';
  }

  const doc = new JsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
  const pw = doc.internal.pageSize.getWidth();

  // Entête teal
  doc.setFillColor(...NAVY);
  doc.rect(0, 0, pw, 38, 'F');
  doc.setFillColor(...NAVY2);
  doc.rect(0, 38, pw, 3, 'F');

  doc.setTextColor(255,255,255);
  doc.setFontSize(17); doc.setFont('helvetica','bold');
  doc.text('EduLink', 14, 15);
  doc.setFontSize(9); doc.setFont('helvetica','normal');
  doc.text('Portail Famille - Bulletin de notes', 14, 23);
  doc.setTextColor(200,200,200); doc.setFontSize(8);
  doc.text('Edite le '+new Date().toLocaleDateString('fr-FR'), 14, 30);

  doc.setTextColor(255,255,255);
  doc.setFontSize(12); doc.setFont('helvetica','bold');
  doc.text('BULLETIN DE NOTES', pw-14, 15, { align:'right' });
  doc.setFontSize(9); doc.setFont('helvetica','normal');
  doc.text('Periode : '+labelPeriodePDF(periode||''), pw-14, 23, { align:'right' });

  let y = 48;

  // Bloc étudiant
  doc.setFillColor(225, 245, 238);
  doc.roundedRect(14, y, pw-28, 28, 3, 3, 'F');
  doc.setDrawColor(...NAVY); doc.setLineWidth(0.4);
  doc.roundedRect(14, y, pw-28, 28, 3, 3, 'S');

  doc.setTextColor(...NAVY2); doc.setFontSize(13); doc.setFont('helvetica','bold');
  doc.text(pdfSafePortail(currentEtudiant.nom+' '+currentEtudiant.prenom), 22, y+9);
  doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(...GRAY);
  doc.text('Matricule : '+(currentEtudiant.matricule||'-'), 22, y+16);
  doc.text('Filiere : '+(currentEtudiant.filiere||'-')+'  |  Niveau : '+(currentEtudiant.niveau||'-'), 22, y+22);

  // Moyenne
  doc.setFillColor(...(moy>=10?GREEN:RED));
  doc.roundedRect(pw-55, y+4, 41, 20, 3, 3, 'F');
  doc.setTextColor(255,255,255); doc.setFontSize(17); doc.setFont('helvetica','bold');
  doc.text(moy.toFixed(2)+'/20', pw-34, y+15, { align:'center' });
  doc.setFontSize(8); doc.setFont('helvetica','normal');
  doc.text(mentionLabel(moy), pw-34, y+21, { align:'center' });

  y += 34;

  doc.setTextColor(...NAVY); doc.setFontSize(10); doc.setFont('helvetica','bold');
  doc.text('Releve de notes - '+labelPeriodePDF(periode||''), 14, y); y += 5;

  const rows = notes.map(n => [
    n.matiere,
    n.note+'/20',
    n.coefficient||1,
    (n.note*(n.coefficient||1)).toFixed(2),
    mentionLabel(n.note)
  ]);
  rows.push([
    'MOYENNE GÉNÉRALE',
    { content:moy.toFixed(2)+'/20', styles:{ fontStyle:'bold', textColor:mentionColor(moy), fontSize:11 } },
    totalCoeff,
    totalPts.toFixed(2),
    { content:mentionLabel(moy), styles:{ fontStyle:'bold', textColor:mentionColor(moy) } }
  ]);

  doc.autoTable({
    startY: y,
    head: [['Matière','Note /20','Coeff.','Points','Mention']],
    body: rows,
    theme: 'grid',
    headStyles: { fillColor:NAVY, textColor:[255,255,255], fontSize:9, fontStyle:'bold', halign:'center' },
    columnStyles: { 0:{halign:'left',cellWidth:68}, 1:{halign:'center'}, 2:{halign:'center'}, 3:{halign:'center'} },
    bodyStyles: { fontSize:9, textColor:[55,65,81] },
    alternateRowStyles: { fillColor:[225,245,238] },
    didParseCell: (d) => { if(d.row.index===rows.length-1){ d.cell.styles.fillColor=[225,245,238]; d.cell.styles.fontStyle='bold'; } },
    margin: { left:14, right:14 }
  });

  y = doc.lastAutoTable.finalY + 15;

  // Barre progression visuelle
  const pct = Math.min(100, moy/20*100);
  doc.setFillColor(229,231,235);
  doc.roundedRect(14, y, pw-28, 6, 3, 3, 'F');
  doc.setFillColor(...(moy>=10?GREEN:RED));
  doc.roundedRect(14, y, (pw-28)*pct/100, 6, 3, 3, 'F');
  doc.setFontSize(8); doc.setTextColor(...GRAY);
  doc.text('Progression : '+pct.toFixed(0)+'%', pw/2, y+11, { align:'center' });
  y += 20;

  // Signatures
  if (y > 240) { doc.addPage(); y = 20; }
  ['Direction','Enseignant(e) référent(e)','Parent / Tuteur'].forEach((s,i) => {
    const sx = 14+(pw-28)/3*i;
    doc.setDrawColor(200,200,200); doc.line(sx, y+16, sx+53, y+16);
    doc.setFontSize(8); doc.setTextColor(...GRAY);
    doc.text(s, sx+26.5, y+22, { align:'center' });
  });

  // Footer
  const ph = doc.internal.pageSize.getHeight();
  doc.setFillColor(243,244,246);
  doc.rect(0, ph-12, pw, 12, 'F');
  doc.setFontSize(7.5); doc.setTextColor(...GRAY);
  doc.text('Bulletin genere via EduLink - Portail Famille', 14, ph-4);
  doc.text('Page 1', pw-14, ph-4, { align:'right' });

  const filename = `Bulletin_${currentEtudiant.nom}_${currentEtudiant.prenom}_${periode||'all'}.pdf`.replace(/\s+/g,'_');
  doc.save(filename);
  showToast('✅ Bulletin PDF téléchargé !', 'success');
}

    }
    const { data } = await q;
    toutesNotifsPortail = data || [];
    // Mettre à jour le badge nav
    const nonLues = toutesNotifsPortail.filter(n => !n.lu).length;
    const badge = document.getElementById('nav-notifs-badge');
    if (badge) {
      if (nonLues > 0) { badge.style.display = 'flex'; badge.textContent = nonLues; }
      else badge.style.display = 'none';
    }
  } catch(e) {
    console.warn('[Portail Notifs]', e.message);
  }
}

// ── Afficher la page Alertes ──────────────────────────────────────────
function afficherNotifsPortail() {
  const page = document.getElementById('page-notifs');
  if (!page) return;

  const nonLues = toutesNotifsPortail.filter(n => !n.lu).length;

  page.innerHTML = `
    <div class="card" style="margin:1rem 1rem 0">
      <div class="pn-header-bar">
        <div class="ph-title">🔔 Mes alertes <span style="font-size:11px;color:#9ca3af;font-weight:400">(${toutesNotifsPortail.length})</span></div>
        ${nonLues > 0 ? `<button class="pn-tout-lire" onclick="marquerToutesLues()">Tout marquer lu</button>` : ''}
      </div>
      <div class="pn-filter-bar" id="pn-filter-bar">
        <button class="pn-filter-btn active" onclick="filtrerNotifsPortail('tous',this)">Toutes</button>
        <button class="pn-filter-btn" onclick="filtrerNotifsPortail('absence',this)">🚫 Absences</button>
        <button class="pn-filter-btn" onclick="filtrerNotifsPortail('note',this)">📊 Notes</button>
        <button class="pn-filter-btn" onclick="filtrerNotifsPortail('examen',this)">📝 Examens</button>
        <button class="pn-filter-btn" onclick="filtrerNotifsPortail('paiement',this)">💳 Paiements</button>
        <button class="pn-filter-btn" onclick="filtrerNotifsPortail('annonce',this)">📢 Annonces</button>
        <button class="pn-filter-btn" onclick="filtrerNotifsPortail('message',this)">✉️ Messages</button>
      </div>
      <div id="pn-liste"></div>
    </div>`;

  renderNotifsListe();
}

function renderNotifsListe() {
  const el = document.getElementById('pn-liste');
  if (!el) return;

  const liste = notifsFiltreActif === 'tous'
    ? toutesNotifsPortail
    : toutesNotifsPortail.filter(n => n.type === notifsFiltreActif);

  if (!liste.length) {
    el.innerHTML = `<div class="pn-empty"><div class="pn-ico">🔔</div><p>Aucune alerte${notifsFiltreActif !== 'tous' ? ' dans cette catégorie' : ''}.</p></div>`;
    return;
  }

  const ICONES   = { annonce:'📢', absence:'🚫', note:'📊', examen:'📝', paiement:'💳', message:'✉️', systeme:'🔔' };
  const COULEURS = { annonce:'blue', absence:'red', note:'teal', examen:'purple', paiement:'amber', message:'green', systeme:'blue' };
  const TYPE_LBL = { annonce:'Annonce', absence:'Absence', note:'Note', examen:'Examen', paiement:'Paiement', message:'Message', systeme:'Système' };

  el.innerHTML = liste.map(n => {
    const ico     = ICONES[n.type]   || '🔔';
    const couleur = COULEURS[n.type] || 'blue';
    const lbl     = TYPE_LBL[n.type] || n.type;
    const urgent  = n.priorite === 'high';
    return `
    <div class="pn-item ${!n.lu ? 'unread' : ''} ${urgent ? 'high' : ''}"
         onclick="marquerLuePortail('${n.id}',this)">
      <div class="pn-ico-wrap ${couleur}">${ico}</div>
      <div class="pn-body">
        <div class="pn-titre">${n.titre || '—'}</div>
        <div class="pn-corps">${n.corps || ''}</div>
        <div class="pn-meta">
          <span class="pn-type-pill badge ${couleur}">${lbl}</span>
          ${urgent ? '<span class="pn-type-pill badge red">URGENT</span>' : ''}
          <span>${fmtDateRelative(n.created_at)}</span>
        </div>
      </div>
      ${!n.lu ? '<div class="pn-dot"></div>' : ''}
    </div>`;
  }).join('');
}

function filtrerNotifsPortail(type, btn) {
  notifsFiltreActif = type;
  document.querySelectorAll('.pn-filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderNotifsListe();
}

// ── Marquer une notification comme lue ───────────────────────────────
async function marquerLuePortail(id, el) {
  if (!id) return;
  const notif = toutesNotifsPortail.find(n => n.id === id);
  if (!notif || notif.lu) return;
  notif.lu = true;
  notif.lu_at = new Date().toISOString();
  // Mettre à jour visuellement
  el.classList.remove('unread');
  el.classList.remove('high');
  const dot = el.querySelector('.pn-dot');
  if (dot) dot.remove();
  // Mettre à jour badge nav
  const nonLues = toutesNotifsPortail.filter(n => !n.lu).length;
  const badge = document.getElementById('nav-notifs-badge');
  if (badge) { badge.style.display = nonLues > 0 ? 'flex' : 'none'; badge.textContent = nonLues; }
  // Persister en base
  await db.from('notifications').update({ lu: true, lu_at: new Date().toISOString() }).eq('id', id).catch(() => {});
  // Naviguer si lien
  if (notif.lien) showPage(notif.lien.replace('/','').replace('.html',''));
}

// ── Tout marquer comme lu ─────────────────────────────────────────────
async function marquerToutesLues() {
  if (!currentEcoleId) return;
  toutesNotifsPortail.forEach(n => { n.lu = true; });
  const badge = document.getElementById('nav-notifs-badge');
  if (badge) badge.style.display = 'none';
  afficherNotifsPortail();
  await db.from('notifications')
    .update({ lu: true, lu_at: new Date().toISOString() })
    .eq('ecole_id', currentEcoleId).eq('lu', false).catch(() => {});
  showToast('✅ Toutes les alertes marquées comme lues', 'success');
}

// ── Date relative lisible ─────────────────────────────────────────────
function fmtDateRelative(d) {
  if (!d) return '—';
  const now  = Date.now();
  const diff = now - new Date(d).getTime();
  const mn   = Math.floor(diff / 60000);
  const h    = Math.floor(diff / 3600000);
  const j    = Math.floor(diff / 86400000);
  if (mn < 2)  return 'À l\'instant';
  if (mn < 60) return `Il y a ${mn} min`;
  if (h < 24)  return `Il y a ${h}h`;
  if (j === 1) return 'Hier';
  if (j < 7)   return `Il y a ${j} jours`;
  return new Date(d).toLocaleDateString('fr-FR', {day:'2-digit',month:'short'});
}

// ── Créer une notification locale (appelée par les triggers auto) ────
async function creerNotifLocale(type, titre, corps, couleur='blue', icone='🔔', lien=null) {
  if (!currentEcoleId) return;
  try {
    const { data } = await db.from('notifications').insert([{
      ecole_id:    currentEcoleId,
      etudiant_id: currentEtudiant?.id || null,
      type, titre, corps, icone, couleur,
      lien,
      priorite:   'normal',
      lu:          false
    }]).select().single();
    if (data) {
      toutesNotifsPortail.unshift(data);
      // Mettre à jour badge
      const badge = document.getElementById('nav-notifs-badge');
      const cnt = toutesNotifsPortail.filter(n => !n.lu).length;
      if (badge && cnt > 0) { badge.style.display = 'flex'; badge.textContent = cnt; }
    }
  } catch(e) {
    console.warn('[Portail Notifs] creerNotifLocale:', e.message);
  }
}

// ══ FCM PORTAIL FAMILLE  ★ JOUR 15 — CORRIGÉ ════════════════════════
//  Fix 1 : enregistrement explicite du SW firebase-messaging-sw.js
//  Fix 2 : passage de swReg à getToken() (requis par FCM web)
//  Fix 3 : config Firebase envoyée au SW via postMessage (dynamic config)

let fcmPortailMessaging  = null;
let fcmPortailToken      = null;
let fcmPortailSwReg      = null;
let fcmPortailFirebaseCfg = null;

// ── Init principale ──────────────────────────────────────────────────
async function initFCMPortail() {
  if (typeof firebase === 'undefined')     return;
  if (!('serviceWorker' in navigator))     return;
  if (!('Notification' in window))         return;

  try {
    // 1. Charger config Firebase depuis Supabase
    const { data } = await db.from('parametres')
      .select('firebase_config')
      .eq('ecole_id', currentEcoleId)
      .maybeSingle();
    if (!data?.firebase_config) {
      console.warn('[FCM Portail] firebase_config absent dans parametres');
      return;
    }
    fcmPortailFirebaseCfg = data.firebase_config;

    // 2. Initialiser Firebase dans le thread principal
    if (!firebase.apps.length) {
      firebase.initializeApp(fcmPortailFirebaseCfg);
    }
    fcmPortailMessaging = firebase.messaging();

    // 3. Enregistrer le Service Worker FCM
    try {
      fcmPortailSwReg = await navigator.serviceWorker.register('/firebase-messaging-sw.js', { scope: '/' });
      await navigator.serviceWorker.ready;

      // Envoyer la config au SW dès qu'il est actif
      envoyerConfigAuSW(fcmPortailSwReg);

      // Aussi envoyer quand le SW passe à l'état "active" (première installation)
      if (fcmPortailSwReg.installing) {
        fcmPortailSwReg.installing.addEventListener('statechange', function() {
          if (this.state === 'activated') envoyerConfigAuSW(fcmPortailSwReg);
        });
      }
    } catch(swErr) {
      console.warn('[FCM Portail] Échec enregistrement SW :', swErr.message);
      // On continue sans SW (foreground seulement)
    }

    // 4. Écouter les messages reçus en premier plan (app ouverte)
    fcmPortailMessaging.onMessage(function(payload) {
      const notif = payload.notification || {};
      const data  = payload.data         || {};
      const titre = notif.title || data.title || 'EduLink';
      const corps = notif.body  || data.body  || '';
      afficherBanniereNotif(titre, corps);
      // Persister dans la table notifications pour l'historique portail
      creerNotifLocale('annonce', titre, corps, 'blue', '🔔', data.url || null);
    });

    // 5. Flux de permission
    if (Notification.permission === 'default') {
      afficherBannierePermission();
    } else if (Notification.permission === 'granted') {
      await abonnerFCMPortail();
    }
    // Si 'denied' → on ne fait rien (l'utilisateur a refusé)

  } catch(err) {
    console.warn('[FCM Portail] Erreur init :', err.message);
  }
}

// ── Envoyer config Firebase au SW via postMessage ────────────────────
function envoyerConfigAuSW(swReg) {
  if (!fcmPortailFirebaseCfg) return;
  const target = swReg.active || swReg.waiting || swReg.installing;
  if (target) {
    target.postMessage({
      type:          'EDULINK_FIREBASE_CONFIG',
      firebaseConfig: fcmPortailFirebaseCfg
    });
    console.log('[FCM Portail] Config envoyée au SW');
  }
}

// ── Demander permission et s'abonner ─────────────────────────────────
async function demanderPermissionPush() {
  try {
    const permission = await Notification.requestPermission();
    masquerBannierePermission();
    if (permission === 'granted') {
      await abonnerFCMPortail();
      afficherBanniereNotif('🔔 Notifications activées !', 'Vous recevrez les alertes en temps réel.');
    } else {
      showToast('Notifications refusées par le navigateur', 'error');
    }
  } catch(err) {
    console.warn('[FCM Portail] Permission error :', err);
  }
}

// ── S'abonner et sauvegarder le token ────────────────────────────────
async function abonnerFCMPortail() {
  try {
    // Récupérer VAPID key depuis Supabase
    const { data } = await db.from('parametres')
      .select('vapid_key').eq('ecole_id', currentEcoleId).maybeSingle();
    const vapidKey = data?.vapid_key || localStorage.getItem('edulink_vapid_key');
    if (!vapidKey) { console.warn('[FCM Portail] VAPID key manquante'); return; }
    if (!fcmPortailMessaging) return;

    // FIX CRITIQUE : passer serviceWorkerRegistration à getToken()
    const tokenOptions = { vapidKey };
    if (fcmPortailSwReg) tokenOptions.serviceWorkerRegistration = fcmPortailSwReg;

    const token = await fcmPortailMessaging.getToken(tokenOptions);
    if (!token) { console.warn('[FCM Portail] Token vide'); return; }
    fcmPortailToken = token;
    localStorage.setItem('edulink_fcm_token', token); // Cache local

    const role = currentProfile?.role || 'parent';
    await db.from('push_tokens').upsert({
      ecole_id:    currentEcoleId,
      token,
      role,
      etudiant_id: currentEtudiant?.id || null,
      user_agent:  navigator.userAgent.slice(0, 200),
      updated_at:  new Date().toISOString()
    }, { onConflict: 'token' });

    console.log('[FCM Portail] ✅ Abonné avec token :', token.slice(0, 20) + '...');
  } catch(err) {
    console.warn('[FCM Portail] Erreur abonnement :', err.message);
  }
}

// ── Bannière permission ───────────────────────────────────────────────
function afficherBannierePermission() {
  const el = document.getElementById('push-permission-banner');
  if (!el) return;
  el.innerHTML = `
    <div class="push-banner">
      <div class="pb-ico">🔔</div>
      <div class="pb-body">
        <div class="pb-title">Activez les notifications push</div>
        <div class="pb-sub">Recevez les alertes d'absence, notes et examens en temps réel</div>
      </div>
      <button class="pb-btn" onclick="demanderPermissionPush()">Activer</button>
      <button class="pb-close" onclick="masquerBannierePermission()">✕</button>
    </div>`;
}

function masquerBannierePermission() {
  const el = document.getElementById('push-permission-banner');
  if (el) el.innerHTML = '';
}

// ── Bannière notification reçue (foreground) ─────────────────────────
function afficherBanniereNotif(titre, message) {
  showToast('🔔 ' + titre + (message ? ' — ' + message : ''), 'info');
  injecterNotifPortail(titre, message, 'annonce');
}

// ── Désinscription ────────────────────────────────────────────────────
async function desabonnerFCMPortail() {
  if (!fcmPortailToken || !fcmPortailMessaging) return;
  try {
    await fcmPortailMessaging.deleteToken();
  } catch(_) {}
  await db.from('push_tokens').delete().eq('token', fcmPortailToken);
  fcmPortailToken = null;
  localStorage.removeItem('edulink_fcm_token');
  showToast('Notifications désactivées', 'info');
}
